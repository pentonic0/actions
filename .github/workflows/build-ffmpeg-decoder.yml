name: Build Media3 FFmpeg Decoder AAR

on:
  workflow_dispatch:

jobs:
  build-ffmpeg-decoder:
    runs-on: ubuntu-latest

    steps:
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl unzip autoconf automake libtool make pkg-config cmake ninja-build yasm nasm python3

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Clone AndroidX Media
        run: |
          git clone --depth 1 --branch release https://github.com/androidx/media.git media

      - name: Fetch FFmpeg source
        run: |
          cd media/libraries/decoder_ffmpeg/src/main/jni

          if [ ! -d "ffmpeg" ]; then
            git clone --depth 1 --branch n6.0 https://github.com/FFmpeg/FFmpeg.git ffmpeg
          fi

      - name: Build FFmpeg native libraries
        run: |
          cd media

          FFMPEG_MODULE_PATH="$(pwd)/libraries/decoder_ffmpeg/src/main"
          NDK_PATH="$ANDROID_NDK_HOME"
          HOST_PLATFORM="linux-x86_64"
          ANDROID_ABI="21"

          ENABLED_DECODERS=(
            aac
            ac3
            eac3
            dca
            truehd
            mlp
            mp3
            flac
            alac
            vorbis
            opus
            amrnb
            amrwb
            pcm_alaw
            pcm_mulaw
          )

          cd "$FFMPEG_MODULE_PATH/jni"
          chmod +x build_ffmpeg.sh

          ./build_ffmpeg.sh \
            "$FFMPEG_MODULE_PATH" \
            "$NDK_PATH" \
            "$HOST_PLATFORM" \
            "$ANDROID_ABI" \
            "${ENABLED_DECODERS[@]}"

      - name: Show available Gradle projects and FFmpeg tasks
        run: |
          cd media
          chmod +x gradlew
          ./gradlew projects --no-daemon
          ./gradlew :lib-decoder-ffmpeg:tasks --all --no-daemon

      - name: Build Media3 FFmpeg decoder AAR
        run: |
          cd media

          echo "Trying assembleRelease..."
          if ./gradlew :lib-decoder-ffmpeg:assembleRelease --no-daemon --stacktrace; then
            echo "assembleRelease succeeded"
          else
            echo "assembleRelease failed. Trying bundleReleaseAar..."
            ./gradlew :lib-decoder-ffmpeg:bundleReleaseAar --no-daemon --stacktrace
          fi

      - name: Debug find all AAR files
        if: always()
        run: |
          echo "Searching all AAR files..."
          find media -name "*.aar" -type f -print || true

          echo "Searching build output files..."
          find media -path "*/build/outputs/*" -type f -print || true

      - name: Collect AAR artifact
        run: |
          mkdir -p out

          echo "Finding FFmpeg AAR files..."
          AAR_FILES=$(find media -name "*.aar" -type f | grep -i "ffmpeg" || true)

          if [ -z "$AAR_FILES" ]; then
            echo "No FFmpeg AAR files found. Trying all AAR files..."
            AAR_FILES=$(find media -name "*.aar" -type f || true)
          fi

          if [ -z "$AAR_FILES" ]; then
            echo "No AAR files found!"
            find media -path "*/build/outputs/*" -type f -print || true
            exit 1
          fi

          echo "$AAR_FILES"

          while IFS= read -r file; do
            cp "$file" out/
          done <<< "$AAR_FILES"

          echo "Copied artifacts:"
          ls -lah out

      - name: Upload FFmpeg decoder AAR
        uses: actions/upload-artifact@v4
        with:
          name: media3-ffmpeg-decoder-aar
          path: out/
