name: Build Media3 AV1 Decoder AAR

on:
  workflow_dispatch:

jobs:
  build-av1-decoder:
    runs-on: ubuntu-latest

    steps:
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl unzip python3 python3-pip ninja-build nasm
          python3 -m pip install --user meson
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Clone AndroidX Media
        run: |
          git clone --depth 1 --branch release https://github.com/androidx/media.git media

      - name: Fetch cpu_features and dav1d
        run: |
          cd media/libraries/decoder_av1/src/main/jni

          if [ ! -d "cpu_features" ]; then
            git clone --depth 1 https://github.com/google/cpu_features.git cpu_features
          fi

          if [ ! -d "dav1d" ]; then
            git clone --depth 1 https://code.videolan.org/videolan/dav1d.git dav1d
          fi

      - name: Build dav1d native libraries
        run: |
          cd media

          AV1_MODULE_PATH="$(pwd)/libraries/decoder_av1/src/main"
          NDK_PATH="$ANDROID_NDK_HOME"
          HOST_PLATFORM="linux-x86_64"

          cd "$AV1_MODULE_PATH/jni"
          chmod +x build_dav1d.sh

          ./build_dav1d.sh "$AV1_MODULE_PATH" "$NDK_PATH" "$HOST_PLATFORM"

      - name: Show available Gradle projects and AV1 tasks
        run: |
          cd media
          chmod +x gradlew
          ./gradlew projects --no-daemon
          ./gradlew :lib-decoder-av1:tasks --all --no-daemon

      - name: Build Media3 AV1 decoder AAR
        run: |
          cd media

          echo "Trying assembleRelease..."
          if ./gradlew :lib-decoder-av1:assembleRelease --no-daemon --stacktrace; then
            echo "assembleRelease succeeded"
          else
            echo "assembleRelease failed. Trying bundleReleaseAar..."
            ./gradlew :lib-decoder-av1:bundleReleaseAar --no-daemon --stacktrace
          fi

      - name: Debug find all AAR files
        if: always()
        run: |
          echo "Searching all AAR files..."
          find media -name "*.aar" -type f -print || true

          echo "Searching build output files..."
          find media -path "*/build/outputs/*" -type f -print || true

      - name: Collect AAR artifact
        run: |
          mkdir -p out

          echo "Finding AAR files..."
          AAR_FILES=$(find media -name "*.aar" -type f || true)

          if [ -z "$AAR_FILES" ]; then
            echo "No AAR files found!"
            echo "Available build output files:"
            find media -path "*/build/outputs/*" -type f -print || true
            exit 1
          fi

          echo "$AAR_FILES"

          while IFS= read -r file; do
            cp "$file" out/
          done <<< "$AAR_FILES"

          echo "Copied artifacts:"
          ls -lah out

      - name: Upload AV1 decoder AAR
        uses: actions/upload-artifact@v4
        with:
          name: media3-av1-decoder-aar
          path: out/
