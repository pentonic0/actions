name: Build Media3 AV1 Decoder AAR

on:
  workflow_dispatch:

jobs:
  build-av1:
    runs-on: ubuntu-latest

    steps:
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip ninja-build nasm curl unzip
          pip3 install --user meson

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Clone AndroidX Media
        run: |
          git clone --depth 1 --branch release https://github.com/androidx/media.git media

      - name: Fetch dav1d
        run: |
          cd media/libraries/decoder_av1/src/main/jni
          git clone --depth 1 https://code.videolan.org/videolan/dav1d.git

      - name: Build dav1d native libraries
        run: |
          cd media/libraries/decoder_av1/src/main/jni
          chmod +x build_dav1d.sh
          ./build_dav1d.sh

      - name: Build AV1 decoder AAR
        run: |
          cd media
          chmod +x gradlew
          ./gradlew :libraries:decoder_av1:assembleRelease --no-daemon --stacktrace

      - name: Collect AAR
        run: |
          mkdir -p out
          find media/libraries/decoder_av1/build/outputs/aar -name "*.aar" -exec cp {} out/ \;
          ls -la out

      - name: Upload AV1 decoder artifact
        uses: actions/upload-artifact@v4
        with:
          name: media3-av1-decoder-aar
          path: out/*.aar
